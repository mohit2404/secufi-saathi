services:
  - type: web
    name: secufi-saathi
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install
    startCommand: pnpm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: NODE_ENV
        value: production